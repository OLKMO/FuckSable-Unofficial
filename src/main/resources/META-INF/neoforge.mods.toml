modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "${license}"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
logoFile = "icon.jpg"
authors = "${mod_author}"
description = '''${mod_description}'''

[[mixins]]
config = "fucksable.mixins.json"

[[dependencies.fucksable]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.fucksable]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.fucksable]]
modId = "sable"
type = "required"
versionRange = "[1.2.2,)"
ordering = "AFTER"
side = "BOTH"
